# fly.toml app configuration file generated for word-counter on 2025-08-18T23:57:24Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'word-counter'
primary_region = 'nrt'
console_command = '/rails/bin/rails console'

[build]

[[mounts]]
  source = 'data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512

[[statics]]
  guest_path = '/rails/public'
  url_prefix = '/'
